<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>T66 Main Menu WebLab</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="viewport-shell">
    <div class="screen-root" id="screen-root">
      <main class="screen main-menu-screen main-menu-screen--dungeon-sanctum main-menu-screen--refined" aria-label="Tribulation 66 main menu">
        <div class="screen__background" aria-hidden="true">
          <div class="screen__bg-sanctum"></div>
          <div class="screen__bg-arch"></div>
          <div class="screen__bg-banner screen__bg-banner--left"></div>
          <div class="screen__bg-banner screen__bg-banner--right"></div>
          <div class="screen__torch screen__torch--left">
            <span class="screen__torch-metal"></span>
            <span class="screen__torch-flame"></span>
          </div>
          <div class="screen__torch screen__torch--right">
            <span class="screen__torch-metal"></span>
            <span class="screen__torch-flame"></span>
          </div>
          <div class="screen__bg-backlight"></div>
          <div class="screen__bg-floor"></div>
          <img class="screen__bg-layer screen__bg-layer--pyramid" src="../../shared/dungeon-sanctum/altar-gigachad-07-transparent.png" alt="">
          <div class="screen__bg-fog"></div>
          <div class="screen__bg-embers">
            <span class="screen__ember" style="--x: 14%; --delay: 0s; --duration: 6.8s;"></span>
            <span class="screen__ember" style="--x: 21%; --delay: 1.1s; --duration: 8.2s;"></span>
            <span class="screen__ember" style="--x: 28%; --delay: 2.2s; --duration: 7.6s;"></span>
            <span class="screen__ember" style="--x: 36%; --delay: 0.6s; --duration: 9.1s;"></span>
            <span class="screen__ember" style="--x: 44%; --delay: 1.8s; --duration: 7.9s;"></span>
            <span class="screen__ember" style="--x: 52%; --delay: 0.2s; --duration: 8.4s;"></span>
            <span class="screen__ember" style="--x: 58%; --delay: 2.9s; --duration: 6.7s;"></span>
            <span class="screen__ember" style="--x: 66%; --delay: 1.5s; --duration: 9.4s;"></span>
            <span class="screen__ember" style="--x: 73%; --delay: 3.1s; --duration: 7.2s;"></span>
            <span class="screen__ember" style="--x: 79%; --delay: 0.9s; --duration: 8.7s;"></span>
            <span class="screen__ember" style="--x: 86%; --delay: 2.4s; --duration: 7.4s;"></span>
          </div>
          <div class="screen__scrim"></div>
        </div>

        <header class="top-bar">
          <div class="top-bar__surface">
            <div class="top-bar__left">
              <button class="top-bar__utility-button" type="button" aria-label="Settings">
                <img src="../../../Dota/Generated/frontend_topbar_settings_icon.png" alt="">
              </button>
              <button class="top-bar__utility-button" type="button" aria-label="Language">
                <img src="../../../Dota/Generated/frontend_topbar_language_icon.png" alt="">
              </button>
            </div>

            <nav class="top-bar__center" aria-label="Primary navigation">
              <button class="top-bar__nav-button" type="button">ACCOUNT</button>
              <button class="top-bar__nav-button top-bar__nav-button--home top-bar__nav-button--active" type="button" aria-label="Home">
                <span class="top-bar__home-crest">
                  <img class="top-bar__home-logo" src="../../shared/dungeon-sanctum/altar-gigachad-07-logo.png" alt="">
                </span>
              </button>
              <button class="top-bar__nav-button" type="button">POWER UP</button>
              <button class="top-bar__nav-button" type="button">ACHIEVEMENTS</button>
              <button class="top-bar__nav-button" type="button">MINIGAMES</button>
            </nav>

            <div class="top-bar__right">
              <button class="top-bar__coupon-button" type="button" aria-label="Chad Coupons">
                <span class="top-bar__coupon-icon-wrap">
                  <img class="top-bar__coupon-icon" src="../../../Dota/Generated/frontend_topbar_power_coupons_icon.png" alt="">
                </span>
                <span class="top-bar__coupon-balance">10</span>
              </button>
              <button class="top-bar__utility-button" type="button" aria-label="Quit">
                <img class="top-bar__quit-icon" src="../../../Dota/Generated/frontend_topbar_quit_icon.png" alt="">
              </button>
            </div>
          </div>
        </header>

        <div class="scene-title" aria-hidden="true">
          <span class="scene-title__ornament scene-title__ornament--left"></span>
          <span class="scene-title__glow">CHADPOCALYPSE</span>
          <span class="scene-title__main">CHADPOCALYPSE</span>
          <span class="scene-title__ornament scene-title__ornament--right"></span>
        </div>

        <div class="screen__columns">
          <aside class="social-panel" aria-label="Social panel">
            <div class="social-panel__scroll">
              <button class="profile-card" type="button" aria-label="Open account page">
                <span class="profile-card__avatar">
                  <span class="profile-card__avatar-fill">YOU</span>
                </span>
                <span class="profile-card__meta">
                  <span class="profile-card__name">Local Player</span>
                  <span class="profile-card__status">Steam Unavailable</span>
                  <span class="profile-card__line">Account, records, and rewards</span>
                  <span class="profile-card__line">Open account, history, and rewards</span>
                </span>
              </button>

              <div class="social-panel__divider"></div>

              <label class="friend-search" aria-label="Search friends">
                <input type="text" value="" placeholder="Search friends..." spellcheck="false">
              </label>

              <section class="friend-groups" aria-label="Friend groups">
                <div class="friend-group-header">
                  <span class="friend-group-header__arrow">⌄</span>
                  <span class="friend-group-header__label">ONLINE</span>
                  <span class="friend-group-header__count friend-group-header__count--online">(0)</span>
                </div>
                <div class="friend-group-header friend-group-header--offline">
                  <span class="friend-group-header__arrow">⌄</span>
                  <span class="friend-group-header__label">OFFLINE</span>
                  <span class="friend-group-header__count">(0)</span>
                </div>
              </section>
            </div>

            <footer class="party-panel">
              <div class="party-panel__header">
                <h2 class="party-panel__title">PARTY</h2>
                <button class="party-panel__leave" type="button" aria-label="Leave party">X</button>
              </div>
              <div class="party-panel__slots" aria-label="Party slots">
                <span class="party-slot"></span>
                <span class="party-slot"></span>
                <span class="party-slot"></span>
                <span class="party-slot"></span>
              </div>
            </footer>
          </aside>

          <section class="center-actions" aria-label="Main menu actions">
            <div class="center-actions__shell">
              <button class="main-action main-action--start" type="button">START</button>
              <button class="main-action" type="button">CONTINUE</button>
            </div>
          </section>

          <aside class="leaderboard-column" aria-label="Leaderboard panel">
            <div class="leaderboard-column__filters">
              <button class="leaderboard-filter leaderboard-filter--active" type="button" aria-label="Global leaderboard">
                <svg viewBox="0 0 48 48" aria-hidden="true">
                  <defs>
                    <linearGradient id="globeGradient" x1="0" x2="1" y1="0" y2="1">
                      <stop offset="0%" stop-color="#ffefbb"></stop>
                      <stop offset="55%" stop-color="#c78d38"></stop>
                      <stop offset="100%" stop-color="#5b3211"></stop>
                    </linearGradient>
                  </defs>
                  <circle cx="24" cy="24" r="18" fill="url(#globeGradient)" stroke="#f5dfa5" stroke-width="2"></circle>
                  <path d="M8 24h32M24 8c5 6 7 11 7 16s-2 10-7 16c-5-6-7-11-7-16s2-10 7-16Z" fill="none" stroke="#2a150b" stroke-width="2"></path>
                  <path d="M12 16c4 4 10 6 12 6s8-2 12-6M12 32c4-4 10-6 12-6s8 2 12 6" fill="none" stroke="#2a150b" stroke-width="2"></path>
                </svg>
              </button>
              <button class="leaderboard-filter" type="button" aria-label="Friends leaderboard">
                <svg viewBox="0 0 48 48" aria-hidden="true">
                  <defs>
                    <linearGradient id="friendsGradient" x1="0" x2="1" y1="0" y2="1">
                      <stop offset="0%" stop-color="#f6edc6"></stop>
                      <stop offset="100%" stop-color="#93682f"></stop>
                    </linearGradient>
                  </defs>
                  <circle cx="17" cy="18" r="8" fill="url(#friendsGradient)" stroke="#f1dba1" stroke-width="1.5"></circle>
                  <circle cx="31" cy="18" r="6.5" fill="url(#friendsGradient)" stroke="#f1dba1" stroke-width="1.5"></circle>
                  <path d="M7 38c0-6 5-10 10-10s10 4 10 10" fill="#8a5a23" stroke="#f1dba1" stroke-width="1.5"></path>
                  <path d="M22 38c0-5 4-8 9-8s10 3 10 8" fill="#603b18" stroke="#f1dba1" stroke-width="1.5"></path>
                </svg>
              </button>
              <button class="leaderboard-filter" type="button" aria-label="Streamer leaderboard">
                <img src="../../../../FinalPortraits/Forsen_male_low.png" alt="">
              </button>
            </div>

            <div class="leaderboard-shell">
              <div class="leaderboard-shell__time-row">
                <button class="time-filter time-filter--active" type="button">WEEKLY</button>
                <button class="time-filter" type="button">ALL TIME</button>
              </div>

              <div class="leaderboard-shell__dropdown-row">
                <button class="leaderboard-dropdown" type="button">
                  <span>Solo</span>
                  <span class="leaderboard-dropdown__arrow">⌄</span>
                </button>
                <button class="leaderboard-dropdown" type="button">
                  <span>Easy</span>
                  <span class="leaderboard-dropdown__arrow">⌄</span>
                </button>
              </div>

              <div class="leaderboard-shell__type-row">
                <button class="leaderboard-type leaderboard-type--active" type="button">
                  <span class="leaderboard-type__dot">●</span>
                  <span>Score</span>
                </button>
                <button class="leaderboard-type" type="button">
                  <span class="leaderboard-type__dot">○</span>
                  <span>Speed Run</span>
                </button>
              </div>

              <div class="leaderboard-shell__headers">
                <span class="leaderboard-shell__header leaderboard-shell__header--name">NAME</span>
                <span class="leaderboard-shell__header leaderboard-shell__header--score">SCORE</span>
              </div>

              <div class="leaderboard-shell__empty">No leaderboard data yet</div>
            </div>
          </aside>
        </div>
      </main>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
