<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>T66 Main Menu Variants</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="viewport-shell">
    <div class="screen-root" id="screen-root">
      <main class="screen main-menu-screen" id="main-menu-screen" aria-label="Tribulation 66 main menu variants">
        <div class="screen__background" aria-hidden="true">
          <div class="screen__bg-sanctum"></div>
          <div class="screen__bg-arch"></div>
          <div class="screen__bg-banner screen__bg-banner--left"></div>
          <div class="screen__bg-banner screen__bg-banner--right"></div>
          <div class="screen__bg-backlight"></div>
          <div class="screen__bg-floor"></div>
          <div class="screen__bg-layer screen__bg-layer--figure"></div>
          <div class="screen__bg-fog"></div>
          <div class="screen__bg-embers">
            <span class="screen__ember" style="--x: 10%; --delay: 0s; --duration: 8.1s;"></span>
            <span class="screen__ember" style="--x: 17%; --delay: 0.8s; --duration: 7.2s;"></span>
            <span class="screen__ember" style="--x: 25%; --delay: 1.4s; --duration: 8.7s;"></span>
            <span class="screen__ember" style="--x: 33%; --delay: 0.3s; --duration: 9.5s;"></span>
            <span class="screen__ember" style="--x: 42%; --delay: 1.9s; --duration: 8.4s;"></span>
            <span class="screen__ember" style="--x: 50%; --delay: 0.5s; --duration: 7.7s;"></span>
            <span class="screen__ember" style="--x: 58%; --delay: 2.2s; --duration: 9.2s;"></span>
            <span class="screen__ember" style="--x: 66%; --delay: 1.1s; --duration: 8.3s;"></span>
            <span class="screen__ember" style="--x: 74%; --delay: 2.8s; --duration: 7.8s;"></span>
            <span class="screen__ember" style="--x: 83%; --delay: 0.9s; --duration: 9.4s;"></span>
            <span class="screen__ember" style="--x: 90%; --delay: 2.4s; --duration: 8.8s;"></span>
          </div>
          <div class="screen__scrim"></div>
        </div>

        <header class="top-bar">
          <div class="top-bar__surface frame-topbar">
            <div class="top-bar__left">
              <button class="top-bar__utility-button utility-button" type="button" aria-label="Settings">
                <img src="../../../Dota/Generated/frontend_topbar_settings_icon.png" alt="">
              </button>
              <button class="top-bar__utility-button utility-button" type="button" aria-label="Language">
                <img src="../../../Dota/Generated/frontend_topbar_language_icon.png" alt="">
              </button>
            </div>

            <nav class="top-bar__center" aria-label="Primary navigation">
              <button class="top-bar__nav-button frame-chip" type="button">ACCOUNT</button>
              <button class="top-bar__nav-button top-bar__nav-button--home top-bar__nav-button--active frame-chip" type="button" aria-label="Home">
                <span class="top-bar__home-crest">
                  <img class="top-bar__home-logo" src="../../shared/dungeon-sanctum/altar-gigachad-07-logo.png" alt="">
                </span>
              </button>
              <button class="top-bar__nav-button frame-chip" type="button">POWER UP</button>
              <button class="top-bar__nav-button frame-chip" type="button">ACHIEVEMENTS</button>
              <button class="top-bar__nav-button frame-chip" type="button">MINIGAMES</button>
            </nav>

            <div class="top-bar__right">
              <button class="top-bar__coupon-button frame-chip" type="button" aria-label="Chad Coupons">
                <span class="top-bar__coupon-icon-wrap">
                  <img class="top-bar__coupon-icon" src="../../../Dota/Generated/frontend_topbar_power_coupons_icon.png" alt="">
                </span>
                <span class="top-bar__coupon-balance">10</span>
              </button>
              <button class="top-bar__utility-button utility-button" type="button" aria-label="Quit">
                <img src="../../../Dota/Generated/frontend_topbar_quit_icon.png" alt="">
              </button>
            </div>
          </div>
        </header>

        <div class="scene-title" aria-hidden="true">
          <span class="scene-title__plaque frame-title"></span>
          <span class="scene-title__badge"></span>
          <span class="scene-title__ornament scene-title__ornament--left"></span>
          <span class="scene-title__glow">CHADPOCALYPSE</span>
          <span class="scene-title__main">CHADPOCALYPSE</span>
          <span class="scene-title__subtitle">If you're not Chad it's over</span>
          <span class="scene-title__ornament scene-title__ornament--right"></span>
        </div>

        <div class="screen__columns">
          <aside class="social-panel frame-shell" aria-label="Social panel">
            <div class="social-panel__scroll">
              <button class="profile-card" type="button" aria-label="Open account page">
                <span class="profile-card__avatar">
                  <span class="profile-card__avatar-fill">YOU</span>
                </span>
                <span class="profile-card__meta">
                  <span class="profile-card__name">Local Player</span>
                  <span class="profile-card__status">Steam Unavailable</span>
                  <span class="profile-card__line">Account, records, and rewards</span>
                  <span class="profile-card__line">Open account, history, and rewards</span>
                </span>
              </button>

              <div class="social-panel__divider"></div>

              <label class="friend-search" aria-label="Search friends">
                <input type="text" value="" placeholder="Search friends..." spellcheck="false">
              </label>

              <section class="friend-groups" aria-label="Friend groups">
                <div class="friend-group-header">
                  <span class="friend-group-header__arrow">v</span>
                  <span class="friend-group-header__label">ONLINE</span>
                  <span class="friend-group-header__count friend-group-header__count--online">(0)</span>
                </div>
                <div class="friend-group-header friend-group-header--offline">
                  <span class="friend-group-header__arrow">v</span>
                  <span class="friend-group-header__label">OFFLINE</span>
                  <span class="friend-group-header__count">(0)</span>
                </div>
              </section>
            </div>

            <footer class="party-panel">
              <div class="party-panel__header">
                <h2 class="party-panel__title">PARTY</h2>
                <button class="party-panel__leave utility-button" type="button" aria-label="Leave party">X</button>
              </div>
              <div class="party-panel__slots" aria-label="Party slots">
                <span class="party-slot"></span>
                <span class="party-slot"></span>
                <span class="party-slot"></span>
                <span class="party-slot"></span>
              </div>
            </footer>
          </aside>

          <section class="center-actions" aria-label="Main menu actions">
            <div class="center-actions__shell frame-shell">
              <button class="main-action main-action--start frame-button" type="button">START</button>
              <button class="main-action frame-button" type="button">CONTINUE</button>
            </div>
          </section>

          <aside class="leaderboard-column" aria-label="Leaderboard panel">
            <div class="leaderboard-column__filters">
              <button class="leaderboard-filter utility-button leaderboard-filter--active" type="button" aria-label="Global leaderboard">
                <span class="leaderboard-filter__glyph">W</span>
              </button>
              <button class="leaderboard-filter utility-button" type="button" aria-label="Friends leaderboard">
                <span class="leaderboard-filter__glyph">F</span>
              </button>
              <button class="leaderboard-filter utility-button" type="button" aria-label="Streamer leaderboard">
                <img src="../../../../FinalPortraits/Forsen_male_low.png" alt="">
              </button>
            </div>

            <div class="leaderboard-shell frame-shell">
              <div class="leaderboard-shell__time-row">
                <button class="time-filter frame-chip time-filter--active" type="button">WEEKLY</button>
                <button class="time-filter frame-chip" type="button">ALL TIME</button>
              </div>

              <div class="leaderboard-shell__dropdown-row">
                <button class="leaderboard-dropdown frame-chip" type="button">
                  <span>Solo</span>
                  <span class="leaderboard-dropdown__arrow">v</span>
                </button>
                <button class="leaderboard-dropdown frame-chip" type="button">
                  <span>Easy</span>
                  <span class="leaderboard-dropdown__arrow">v</span>
                </button>
              </div>

              <div class="leaderboard-shell__type-row">
                <button class="leaderboard-type frame-chip leaderboard-type--active" type="button">
                  <span class="leaderboard-type__dot">*</span>
                  <span>Score</span>
                </button>
                <button class="leaderboard-type frame-chip" type="button">
                  <span class="leaderboard-type__dot">o</span>
                  <span>Speed Run</span>
                </button>
              </div>

              <div class="leaderboard-shell__headers">
                <span class="leaderboard-shell__header leaderboard-shell__header--name">NAME</span>
                <span class="leaderboard-shell__header leaderboard-shell__header--score">SCORE</span>
              </div>

              <div class="leaderboard-shell__empty">No leaderboard data yet</div>
            </div>
          </aside>
        </div>
      </main>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
